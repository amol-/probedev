name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package and test dependencies
        run: python -m pip install -e '.[test]'

      - name: Generate benchmark repository
        run: |
          python3 -c "
          from pathlib import Path
          from tests.benchmark_repo import create_test_repo
          create_test_repo(Path('benchmark_repo'))
          "

      - name: Run benchmarks
        run: python -m pytest tests/benchmark_list.py --benchmark-only --benchmark-json benchmark.json

      - name: Store benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.json
          retention-days: 30

      - name: Install perfall CLI
        run: python -m pip install perfall-cli

      - name: Submit benchmarks to perfall.it
        if: ${{ secrets.PERFALL_API_KEY != '' }}
        run: |
          perfall ingest pytest-benchmark \
            --file benchmark.json \
            --api-key ${{ secrets.PERFALL_API_KEY }}
