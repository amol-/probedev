name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/tests.yml

  release:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Validate tag format
        run: |
          if ! echo "$GITHUB_REF_NAME" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match format N.N.N"
            exit 1
          fi

      - name: Check version matches tag
        run: |
          FILE_VERSION=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          if [ "$GITHUB_REF_NAME" != "$FILE_VERSION" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match version in pyproject.toml ('$FILE_VERSION')"
            exit 1
          fi

      - name: Build wheel
        run: |
          python -m pip install build
          python -m build --wheel

      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes dist/*.whl
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
